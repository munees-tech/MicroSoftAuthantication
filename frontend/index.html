<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microsoft Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 350px;
      }

      h1 {
        margin-bottom: 20px;
        color: #333;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #0078d4;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #005ea6;
      }

      .user-data {
        margin-top: 20px;
        text-align: left;
        background: #f1f1f1;
        padding: 10px;
        border-radius: 5px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Microsoft OAuth</h1>

      <button onclick="loginWithMicrosoft()">Login with Microsoft</button>

      <div class="user-data" id="userData"></div>
    </div>

    <script>
      function loginWithMicrosoft() {
        window.location.href = "http://localhost:5000/auth/microsoft";
      }
    </script>
  </body>
</html>
