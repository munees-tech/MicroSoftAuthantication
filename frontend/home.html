<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Home</title>

    <style>
      body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #0078d4;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="welcome">Loading...</h1>
      <p id="email"></p>
      <button id="logout" onclick="LogoutFun()">Logout</button>
    </div>

    <script>
      async function getUser() {
        try {
          const response = await fetch("https://login-system-cq55.onrender.com/auth/me/", {
            credentials: "include",
          });

          const user = await response.json();
          console.log(user);
          document.getElementById("welcome").innerText =
            `Hello ${user.displayName}`;
          document.getElementById("email").innerText = `${user.email}`;
        } catch (error) {
          console.log(error);
        }
      }

      getUser();

      async function LogoutFun() {
        try {
          const response = await fetch("http://localhost:5000/auth/logout", {
            credentials: "include",
          });
          if (response.ok) {
            window.location.href = "http://localhost:5500/frontend/index.html";
          }
        } catch (error) {
          console.log(error);
        }
      }
    </script>
  </body>
</html>
